services:
  postgres:
    image: postgres:15-alpine
    container_name: catan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: catan
      POSTGRES_PASSWORD: catan_secret
      POSTGRES_DB: catan_tournament
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U catan -d catan_tournament' ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: catan-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: catan-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://catan:catan_secret@postgres:5432/catan_tournament
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/tournaments" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
    command: sh -c "cd apps/api && npx prisma migrate deploy && NODE_OPTIONS='--max-old-space-size=768' npm run start:dev"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: catan-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_API_PROXY_TARGET: http://api:3000
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./packages/shared/src:/app/packages/shared/src
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
